<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>

    <form action="./a2.html">  
    <div> <label for="name"> Name</label>
    <input type="text" id="name" placeholder="Enter your name">
    </div><br>

    <div> <label for="sname"> Surname</label>
    <input type="text" id="sname" placeholder="Enter your surname">
    </div><br>

    <div>
    <label for="mail"> Email</label>
    <input type="mail" id="mail" placeholder="Enter your mail">
    </div><br>

    <div>
    <label for="bdate"> Birthdate</label>
    <input type="date" id="bdate" placeholder="Enter your birthdate">
    </div><br>

    <!-- <div>
    <label for="name"> </label>
    <input type="text" id="name" placeholder="Enter your name">
    </div><br> -->

    <label for="genders"> Gender </label>

    <input type="radio" id="m" value="male" name="genders">
    <label for="m"> Male</label> 

    <input type="radio" id="f" value="female" name="genders">
    <label for="f"> Female</label> 

    <input type="radio" id="o" value="others" name="genders">
    <label for="o"> Others</label> 
    <br><br>




    <label for="place"> Choose city near you </label>

    <input type="checkbox" id="pune" value="Pune" name="place">
    <label for="pune"> Pune</label> 

    <input type="checkbox" id="mumbai" value="Mumbai" name="place">
    <label for="mumbai"> Mumbai</label> 

    <input type="checkbox" id="jaipur" value="Jaipur" name="place">
    <label for="jaipur"> Jaipur</label> 
    <br><br>



    <div>
    <label for="doc">Upload your documents here---> </label>
    <input type="file" id="doc" name="'doc" multiple> 
    </div>
    <br>
    <br>

   <button value="submit"> Click here to submit </button>

    </form>

</body>
</html>
